name: Build macOS App

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
  workflow_dispatch:

concurrency:
  group: build-app-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write  # needed to attach artifacts to a release on tag

env:
  # Public Team ID from SpaceTrucker2196's Apple Developer account.
  APPLE_TEAM_ID: U3Z59VXPUB

jobs:
  build:
    name: Build MeowPassword.app
    runs-on: macos-15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Show toolchain
        run: |
          sw_vers
          xcodebuild -version
          swift --version

      - name: Build CLI
        run: swift build -c release --product meowpass

      - name: Build App
        run: swift build -c release --product MeowPasswordApp

      - name: Run CLI tests
        run: .build/release/meowpass --test

      - name: Run Swift package tests (UI + parser + model)
        run: swift test

      - name: Package .app bundle (ad-hoc)
        env:
          CONFIG: release
        run: ./build_app.sh

      # -------- Developer ID signing (only on push / manual, when secrets set) --------

      - name: Import Developer ID certificate(s)
        id: import_cert
        if: github.event_name != 'pull_request'
        env:
          APP_CERT_B64: ${{ secrets.APPLE_DEVELOPER_ID_CERT_P12_BASE64 }}
          APP_CERT_PW:  ${{ secrets.APPLE_DEVELOPER_ID_CERT_PASSWORD }}
          INSTALLER_CERT_B64: ${{ secrets.APPLE_DEVELOPER_ID_INSTALLER_CERT_P12_BASE64 }}
          INSTALLER_CERT_PW:  ${{ secrets.APPLE_DEVELOPER_ID_INSTALLER_CERT_PASSWORD }}
        run: |
          if [[ -z "$APP_CERT_B64" ]]; then
            echo "No signing secrets configured — leaving ad-hoc signature in place."
            exit 0
          fi
          KEYCHAIN=build.keychain
          KEYCHAIN_PW=$(uuidgen)
          security create-keychain -p "$KEYCHAIN_PW" "$KEYCHAIN"
          security default-keychain -s "$KEYCHAIN"
          security unlock-keychain -p "$KEYCHAIN_PW" "$KEYCHAIN"
          security set-keychain-settings -lut 21600 "$KEYCHAIN"

          echo "$APP_CERT_B64" | base64 --decode > app_cert.p12
          security import app_cert.p12 -k "$KEYCHAIN" -P "$APP_CERT_PW" \
            -T /usr/bin/codesign -T /usr/bin/security -T /usr/bin/productbuild
          rm -f app_cert.p12

          if [[ -n "$INSTALLER_CERT_B64" ]]; then
            echo "$INSTALLER_CERT_B64" | base64 --decode > installer_cert.p12
            security import installer_cert.p12 -k "$KEYCHAIN" -P "$INSTALLER_CERT_PW" \
              -T /usr/bin/codesign -T /usr/bin/security -T /usr/bin/productbuild
            rm -f installer_cert.p12
          fi

          security set-key-partition-list -S apple-tool:,apple:,codesign:,productbuild: \
            -s -k "$KEYCHAIN_PW" "$KEYCHAIN" >/dev/null
          security list-keychains -d user -s "$KEYCHAIN" login.keychain

          APP_IDENTITY=$(security find-identity -v -p codesigning "$KEYCHAIN" \
            | grep "Developer ID Application" | head -1 \
            | sed -E 's/.*"([^"]+)".*/\1/')
          if [[ -z "$APP_IDENTITY" ]]; then
            echo "No Developer ID Application identity found in keychain." >&2
            exit 1
          fi
          echo "CODESIGN_IDENTITY=$APP_IDENTITY" >> "$GITHUB_ENV"
          echo "Using app identity: $APP_IDENTITY"

          INSTALLER_IDENTITY=$(security find-identity -v "$KEYCHAIN" \
            | grep "Developer ID Installer" | head -1 \
            | sed -E 's/.*"([^"]+)".*/\1/' || true)
          if [[ -n "$INSTALLER_IDENTITY" ]]; then
            echo "CODESIGN_INSTALLER_IDENTITY=$INSTALLER_IDENTITY" >> "$GITHUB_ENV"
            echo "Using installer identity: $INSTALLER_IDENTITY"
          else
            echo "No Developer ID Installer identity — CLI pkg will be unsigned."
          fi

      - name: Re-sign app with Developer ID (hardened runtime)
        if: env.CODESIGN_IDENTITY != ''
        run: |
          # Sign inside-out: nested CLI first, then the app itself.
          codesign --force --options runtime --timestamp \
            --sign "$CODESIGN_IDENTITY" \
            MeowPassword.app/Contents/MacOS/meowpass
          codesign --force --deep --options runtime --timestamp \
            --sign "$CODESIGN_IDENTITY" \
            MeowPassword.app
          codesign --verify --deep --strict --verbose=2 MeowPassword.app

      - name: Notarize .app
        if: env.CODESIGN_IDENTITY != ''
        env:
          APPLE_ID:  ${{ secrets.APPLE_NOTARY_APPLE_ID }}
          APP_PW:    ${{ secrets.APPLE_NOTARY_APP_PASSWORD }}
        run: |
          if [[ -z "$APPLE_ID" || -z "$APP_PW" ]]; then
            echo "Signing OK but notarization secrets are missing — skipping notarization." >&2
            exit 0
          fi
          ditto -c -k --sequesterRsrc --keepParent MeowPassword.app notary.zip
          xcrun notarytool submit notary.zip \
            --apple-id "$APPLE_ID" \
            --team-id "$APPLE_TEAM_ID" \
            --password "$APP_PW" \
            --wait
          xcrun stapler staple MeowPassword.app
          spctl -a -vv -t execute MeowPassword.app || true
          rm -f notary.zip

      # -------- Package + release --------

      - name: Read version
        id: version
        run: |
          VERSION=$(/usr/libexec/PlistBuddy -c "Print :CFBundleShortVersionString" MeowPassword.app/Contents/Info.plist)
          if [[ "${GITHUB_REF_TYPE}" != "tag" ]]; then
            VERSION="${VERSION}+${GITHUB_SHA::7}"
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Version: $VERSION"

      - name: Zip .app
        run: |
          ditto -c -k --sequesterRsrc --keepParent \
            MeowPassword.app \
            "MeowPassword-${{ steps.version.outputs.version }}.app.zip"

      - name: Build .dmg
        env:
          VERSION: ${{ steps.version.outputs.version }}
        run: ./make_dmg.sh

      - name: Notarize .dmg
        if: env.CODESIGN_IDENTITY != ''
        env:
          APPLE_ID:  ${{ secrets.APPLE_NOTARY_APPLE_ID }}
          APP_PW:    ${{ secrets.APPLE_NOTARY_APP_PASSWORD }}
          VERSION:   ${{ steps.version.outputs.version }}
        run: |
          if [[ -z "$APPLE_ID" || -z "$APP_PW" ]]; then
            echo "Notarization secrets missing — skipping DMG notarization." >&2
            exit 0
          fi
          xcrun notarytool submit "MeowPassword-${VERSION}.dmg" \
            --apple-id "$APPLE_ID" \
            --team-id "$APPLE_TEAM_ID" \
            --password "$APP_PW" \
            --wait
          xcrun stapler staple "MeowPassword-${VERSION}.dmg"
          spctl -a -vv -t open --context context:primary-signature "MeowPassword-${VERSION}.dmg" || true

      # -------- CLI installer .pkg + DMG --------

      - name: Build meowpass .pkg installer
        env:
          VERSION: ${{ steps.version.outputs.version }}
        run: ./make_cli_pkg.sh

      - name: Notarize meowpass .pkg
        if: env.CODESIGN_IDENTITY != '' && env.CODESIGN_INSTALLER_IDENTITY != ''
        env:
          APPLE_ID:  ${{ secrets.APPLE_NOTARY_APPLE_ID }}
          APP_PW:    ${{ secrets.APPLE_NOTARY_APP_PASSWORD }}
          VERSION:   ${{ steps.version.outputs.version }}
        run: |
          if [[ -z "$APPLE_ID" || -z "$APP_PW" ]]; then
            echo "Notarization secrets missing — skipping pkg notarization." >&2
            exit 0
          fi
          xcrun notarytool submit "meowpass-${VERSION}.pkg" \
            --apple-id "$APPLE_ID" \
            --team-id "$APPLE_TEAM_ID" \
            --password "$APP_PW" \
            --wait
          xcrun stapler staple "meowpass-${VERSION}.pkg"

      - name: Wrap meowpass .pkg in DMG
        env:
          VERSION: ${{ steps.version.outputs.version }}
        run: ./make_cli_installer_dmg.sh

      - name: Notarize meowpass installer DMG
        if: env.CODESIGN_IDENTITY != ''
        env:
          APPLE_ID:  ${{ secrets.APPLE_NOTARY_APPLE_ID }}
          APP_PW:    ${{ secrets.APPLE_NOTARY_APP_PASSWORD }}
          VERSION:   ${{ steps.version.outputs.version }}
        run: |
          if [[ -z "$APPLE_ID" || -z "$APP_PW" ]]; then
            echo "Notarization secrets missing — skipping CLI DMG notarization." >&2
            exit 0
          fi
          xcrun notarytool submit "meowpass-CLI-Installer-${VERSION}.dmg" \
            --apple-id "$APPLE_ID" \
            --team-id "$APPLE_TEAM_ID" \
            --password "$APP_PW" \
            --wait
          xcrun stapler staple "meowpass-CLI-Installer-${VERSION}.dmg"

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: MeowPassword-${{ steps.version.outputs.version }}
          path: |
            MeowPassword-*.app.zip
            MeowPassword-*.dmg
            meowpass-*.pkg
            meowpass-CLI-Installer-*.dmg
          if-no-files-found: error

      - name: Attach to release (tag builds only)
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            MeowPassword-*.app.zip
            MeowPassword-*.dmg
            meowpass-*.pkg
            meowpass-CLI-Installer-*.dmg
          generate_release_notes: true
