name: MeowPassword
options:
  bundleIdPrefix: io.river
  developmentLanguage: en
  deploymentTarget:
    iOS: "17.0"
    macOS: "13.0"
  groupSortPosition: top
  generateEmptyDirectories: true
configs:
  Debug: debug
  Release: release
settings:
  base:
    SWIFT_VERSION: "5.10"
    MARKETING_VERSION: "1.1.2"
    CURRENT_PROJECT_VERSION: "1"
    DEVELOPMENT_TEAM: "U3Z59VXPUB"
    CODE_SIGN_STYLE: Automatic
# Both app targets link the shared SwiftPM libraries from this same package
# (local path package) so iOS and macOS ship one engine under one App Store
# Connect record (shared bundle id io.river.MeowPassword).
packages:
  MeowLocal:
    path: .
targets:
  # ── iOS (iPhone + iPad) ────────────────────────────────────────────────
  MeowPassword:
    type: application
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: iOSApp
    dependencies:
      - target: MeowGramDecode     # embed the decode share extension
      - package: MeowLocal
        product: MeowStego
      - package: MeowLocal
        product: MeowGramKit
      - package: MeowLocal
        product: MeowGramAssets
      - package: MeowLocal
        product: MeowPassCore
      - package: MeowLocal
        product: MeowUI
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: io.river.meowpassword
        INFOPLIST_FILE: iOSApp/Info.plist
        CODE_SIGN_ENTITLEMENTS: iOSApp/MeowPassword.entitlements
        IPHONEOS_DEPLOYMENT_TARGET: "17.0"
        TARGETED_DEVICE_FAMILY: "1,2"
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ENABLE_PREVIEWS: YES

  # ── Decode share extension (Share sheet → "Decode MeowGram") ────────────
  # Links only the decode code — no cat assets — so it stays small.
  MeowGramDecode:
    type: app-extension
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: ShareExtension
    dependencies:
      - package: MeowLocal
        product: MeowStego
      - package: MeowLocal
        product: MeowGramKit
      - package: MeowLocal
        product: MeowPassCore
      - package: MeowLocal
        product: MeowUI
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: io.river.meowpassword.decode
        INFOPLIST_FILE: ShareExtension/Info.plist
        CODE_SIGN_ENTITLEMENTS: ShareExtension/MeowGramDecode.entitlements
        IPHONEOS_DEPLOYMENT_TARGET: "17.0"
        TARGETED_DEVICE_FAMILY: "1,2"

  # ── iOS unit tests (compose/decode round-trip) ─────────────────────────
  MeowPasswordTests:
    type: bundle.unit-test
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: iOSAppTests
    dependencies:
      - target: MeowPassword
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: io.river.meowpassword.tests
        GENERATE_INFOPLIST_FILE: YES

  # ── iOS UI tests (readability in light + dark appearance) ──────────────
  MeowPasswordUITests:
    type: bundle.ui-testing
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: iOSUITests
    dependencies:
      - target: MeowPassword
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: io.river.meowpassword.uitests
        GENERATE_INFOPLIST_FILE: YES

  # ── macOS (same App Store Connect record) ──────────────────────────────
  # Reuses the existing SwiftUI app sources. The SwiftPM + build_app.sh +
  # Developer ID DMG path remains for direct distribution of the same code.
  MeowPasswordMac:
    type: application
    platform: macOS
    deploymentTarget: "13.0"
    sources:
      - path: Sources/MeowPasswordApp
        excludes:
          - "Resources/Info.plist"
          - "Resources/*.entitlements"
    dependencies:
      - package: MeowLocal
        product: MeowStego
      - package: MeowLocal
        product: MeowGramKit
      - package: MeowLocal
        product: MeowGramAssets
      - package: MeowLocal
        product: MeowPassCore
      - package: MeowLocal
        product: MeowUI
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: io.river.meowpassword
        PRODUCT_NAME: MeowPassword
        INFOPLIST_FILE: Sources/MeowPasswordApp/Resources/Info.plist
        MACOSX_DEPLOYMENT_TARGET: "13.0"
        ENABLE_HARDENED_RUNTIME: YES
        # Mac App Store build: App Sandbox on (the Developer ID / DMG path via
        # build_app.sh uses the non-sandbox MeowPassword.entitlements instead).
        CODE_SIGN_ENTITLEMENTS: Sources/MeowPasswordApp/Resources/MeowPassword-AppStore.entitlements

# Explicit shared schemes. Without these, Xcode auto-manages schemes and will
# happily try to build the package's macOS-only executable targets (the
# `meowpass` CLI, the `MeowPasswordApp` SwiftPM app) against an iOS device —
# which fails on AppKit / Process. Each scheme below builds ONLY its app target;
# Xcode pulls in the five library products as implicit dependencies.
schemes:
  MeowPassword:            # iOS (iPhone + iPad)
    build:
      targets:
        MeowPassword: all
    run:
      config: Debug
    test:
      config: Debug
      targets:
        - MeowPasswordTests
        - MeowPasswordUITests
    archive:
      config: Release
  MeowPasswordMac:         # macOS (same App Store Connect record)
    build:
      targets:
        MeowPasswordMac: all
    run:
      config: Debug
    archive:
      config: Release
